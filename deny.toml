# deny.toml — cargo-deny configuration for PhenoContracts Rust workspace.
# See https://embarkstudios.github.io/cargo-deny/

[graph]
# 1 crate may have 2+ semver-incompatible versions in the dep graph.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
]

[advisories]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
ignore = []
# DB path — can be local or remote; we default to the GitHub Advisory Database.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
deny = []
copyleft = "deny"
blanket = { deny = ["MIT", "Apache-2.0"] }
allow-osi-fsf-free = "neither"
default = "deny"
confidence-threshold = 0.8
exceptions = [
    { allow = ["Unicode-3.0"], name = "unicode-ident" },
    { allow = ["Unicode-DFS-2016"], name = "unicode-width" },
]

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
deny = []
skip = [
    # Remove once darling drops syn <2 dependency.
    { name = "syn", version = "1" },
]
skip-tree = [
    # criterion pulls in many dev-only deps we don't need to chase.
    { name = "criterion", version = "0.5" },
]

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-git = []
allow-registry = ["https://github.com/rustsec/advisory-db"]
